<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360">
  <rect x="0" y="0" width="960" height="360" fill="#ffffff"/>
  <text x="480" y="28" text-anchor="middle" font-size="22" fill="#1f2937">Multi-timescale routing system overview</text>
  <rect x="30" y="80" width="130" height="58" rx="12" fill="#dbeafe"/>
  <text x="95" y="112" text-anchor="middle" font-size="16" fill="#111827">Question</text>
  <rect x="200" y="60" width="200" height="98" rx="12" fill="#e5e7eb"/>
  <text x="300" y="92" text-anchor="middle" font-size="16" fill="#111827">State features</text>
  <text x="300" y="116" text-anchor="middle" font-size="13" fill="#374151">confidence, evidence, memory</text>
  <text x="300" y="136" text-anchor="middle" font-size="13" fill="#374151">recurrence, volatility, history</text>
  <rect x="445" y="74" width="155" height="70" rx="12" fill="#fde68a"/>
  <text x="522" y="104" text-anchor="middle" font-size="16" fill="#111827">Six-action router</text>
  <text x="522" y="126" text-anchor="middle" font-size="13" fill="#374151">quality + cost + forgetting</text>
  <line x1="160" y1="109" x2="200" y2="109" stroke="#1f2937"/>
  <line x1="400" y1="109" x2="445" y2="109" stroke="#1f2937"/>
  <rect x="650" y="34" width="274" height="196" rx="14" fill="#ecfdf5"/>
  <text x="787" y="58" text-anchor="middle" font-size="16" fill="#111827">Choose one action</text>
  <text x="787" y="78" text-anchor="middle" font-size="12" fill="#374151">the router selects exactly one alternative</text>
  <rect x="668" y="94" width="110" height="44" rx="10" fill="#dcfce7"/>
  <text x="723" y="120" text-anchor="middle" font-size="13" fill="#111827">Parametric answer</text>
  <rect x="796" y="94" width="110" height="44" rx="10" fill="#dcfce7"/>
  <text x="851" y="120" text-anchor="middle" font-size="13" fill="#111827">Retrieve</text>
  <rect x="668" y="146" width="110" height="44" rx="10" fill="#dcfce7"/>
  <text x="723" y="172" text-anchor="middle" font-size="13" fill="#111827">Memory read</text>
  <rect x="796" y="146" width="110" height="44" rx="10" fill="#dcfce7"/>
  <text x="851" y="172" text-anchor="middle" font-size="13" fill="#111827">Memory write</text>
  <rect x="668" y="198" width="110" height="44" rx="10" fill="#dcfce7"/>
  <text x="723" y="224" text-anchor="middle" font-size="13" fill="#111827">Temporary adapt</text>
  <rect x="796" y="198" width="110" height="44" rx="10" fill="#dcfce7"/>
  <text x="851" y="224" text-anchor="middle" font-size="13" fill="#111827">Durable consolidate</text>
  <line x1="600" y1="109" x2="650" y2="109" stroke="#1f2937"/>
  <rect x="230" y="258" width="500" height="68" rx="12" fill="#ede9fe"/>
  <text x="480" y="276" text-anchor="middle" font-size="16" fill="#111827">Logging and evaluation</text>
  <text x="480" y="300" text-anchor="middle" font-size="13" fill="#374151">answer quality, stale-answer rate, retrieval cost, writes, rollback, forgetting</text>
  <line x1="787" y1="230" x2="787" y2="250" stroke="#1f2937"/>
  <line x1="787" y1="250" x2="620" y2="258" stroke="#1f2937"/>
</svg>
